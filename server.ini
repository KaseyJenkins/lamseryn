[globals]
# Logging
log_level = info                  ; error | warn | info | debug | trace
log_categories = all        ; comma-separated: all,core,accept,io,http,buf,timer,poll
; log_categories = core,http        ; comma-separated: all,core,accept,io,http,buf,timer,poll

# io_uring
workers = 2
queue_depth = 4096
#pre_accepts = 64

# Timeouts (ms)
initial_idle_timeout_ms = 5000
keepalive_idle_close_ms = 10000
header_timeout_ms = 5000
body_timeout_ms = 30000
write_timeout_ms = 10000
drain_timeout_ms = 200

# Accept/backoff
accept_backoff_ms = 10

# Wake topology: shared (default, lower FD usage) | per-worker
# wake_pipe_mode = shared

# Access log
# access_log_enabled = false
# access_log_path = stderr           ; stderr | stdout | /path/to/access.log
# access_log_format = text
# access_log_sample = 1              ; 1/N sampling
# access_log_min_status = 100        ; only emit status >= this code

# Defaults for vhosts
default_max_header_fields = 100

# TLS defaults (consumed by vhosts that do not override)
# tls = false
# tls_cert_file = /etc/ssl/certs/server.crt
# tls_key_file = /etc/ssl/private/server.key
# tls_min_version = tls1.2
# tls_ciphers = HIGH:!aNULL:!MD5
# tls_ciphersuites = TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256
# tls_session_tickets = true
# tls_session_cache = true

[vhost default]
bind = 0.0.0.0
port = 8080
docroot = tests/integration/wwwroot
# tls = false
# tls_cert_file = tests/certs/server.crt
# tls_key_file = tests/certs/server.key
static = true
range = true
conditional = true
compression = true
compression_dynamic = true
# compression_dynamic_min_bytes = 256
# compression_dynamic_max_bytes = 1048576
# compression_dynamic_effort = 1
# header_set = Cache-Control: no-cache
# header_set = X-Content-Type-Options: nosniff
auth = false
max_header_fields = 100

[vhost admin]
bind = 127.0.0.1
port = 8090
docroot = tests/integration/adminroot
static = true
auth = true
max_header_fields = 64

[vhost localhost]
bind = 0.0.0.0
port = 8443
docroot = tests/integration/wwwroot
static = true
range = true
conditional = true
compression = false
auth = false
max_header_fields = 100
tls = true
tls_cert_file = tests/integration/certs/localhost.crt
tls_key_file = tests/integration/certs/localhost.key
tls_min_version = tls1.2
